name: Vendor and release SDK

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "Version for the SDK release tag"
        type: string
        required: true

permissions:
  contents: write

concurrency:
  group: vendor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      fetch: ${{ steps.f.outputs.matrix }}
      build: ${{ steps.b.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: f
        run: python vendor/vendor.py matrix --kind fetch
      - id: b
        run: python vendor/vendor.py matrix --kind build

  fetch:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.fetch) }}
    runs-on: ${{ matrix.runner }}
    name: fetch ${{ matrix.library }} ${{ matrix.arch }}/${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install extractors
        run: sudo apt-get update && sudo apt-get install -y p7zip-full libarchive-tools llvm
      - name: Fetch and stage
        run: |
          python vendor/vendor.py fetch \
            --library "${{ matrix.library }}" \
            --arch "${{ matrix.arch }}" \
            --os "${{ matrix.os }}" \
            --stage "$RUNNER_TEMP/stage"
      - uses: actions/upload-artifact@v6
        with:
          name: stage-fetch-${{ matrix.library }}-${{ matrix.arch }}-${{ matrix.os }}
          path: ${{ runner.temp }}/stage/
          if-no-files-found: error
          retention-days: 3

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.build) }}
    runs-on: ${{ matrix.runner }}
    name: build ${{ matrix.library }} ${{ matrix.arch }}/${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: lukka/get-cmake@latest
      - name: Build and stage
        shell: bash
        run: |
          python vendor/vendor.py build \
            --library "${{ matrix.library }}" \
            --arch "${{ matrix.arch }}" \
            --os "${{ matrix.os }}" \
            --stage "$RUNNER_TEMP/stage"
      - uses: actions/upload-artifact@v6
        with:
          name: stage-build-${{ matrix.library }}-${{ matrix.arch }}-${{ matrix.os }}
          path: ${{ runner.temp }}/stage/
          if-no-files-found: error
          retention-days: 3

  release:
    needs: [fetch, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v7
        with:
          pattern: stage-*
          path: _stages
      - name: Assemble and package
        run: |
          python vendor/vendor.py package \
            --stages _stages \
            --out dist \
            --version "${{ inputs.sdk_version }}"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: sdk-${{ inputs.sdk_version }}
          name: azoth-sdk ${{ inputs.sdk_version }}
          files: |
            dist/azoth-sdk-*.tar.gz
            dist/azoth-sdk-*.zip
            dist/SHA256SUMS
