name: Vendor and release SDK

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "Release version, e.g. 2026.07.0 (the azoth-sdk- prefix, tag, and name are derived automatically)"
        type: string
        required: true

permissions:
  contents: write

concurrency:
  group: vendor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      fetch: ${{ steps.f.outputs.matrix }}
      build: ${{ steps.b.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: f
        run: python vendor/vendor.py matrix --kind fetch
      - id: b
        run: python vendor/vendor.py matrix --kind build

  fetch:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.fetch) }}
    runs-on: ${{ matrix.runner }}
    name: fetch ${{ matrix.library }} ${{ matrix.arch }}/${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install extractors
        # macOS runners already ship hdiutil, xar, bsdtar and the Mach-O tools.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y p7zip-full libarchive-tools llvm
      - name: Fetch and stage
        run: |
          python vendor/vendor.py fetch \
            --library "${{ matrix.library }}" \
            --arch "${{ matrix.arch }}" \
            --os "${{ matrix.os }}" \
            --stage "$RUNNER_TEMP/stage"
      - name: Pack stage
        # Artifact upload zips the payload, which forces every file to 644 and
        # dereferences symlinks. Ship a tar so modes and links survive the trip.
        run: tar -C "$RUNNER_TEMP/stage" -cf "$RUNNER_TEMP/stage.tar" .
      - uses: actions/upload-artifact@v6
        with:
          name: stage-fetch-${{ matrix.library }}-${{ matrix.arch }}-${{ matrix.os }}
          path: ${{ runner.temp }}/stage.tar
          if-no-files-found: error
          retention-days: 3

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.build) }}
    runs-on: ${{ matrix.runner }}
    name: build ${{ matrix.library }} ${{ matrix.arch }}/${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: lukka/get-cmake@latest
      - name: Install build deps
        # The Tracy GUI links GLFW against X11 (LEGACY=ON). Providing freetype and
        # capstone here also stops Tracy's CPM fallback from rebuilding them.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            pkg-config libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libgl1-mesa-dev libxkbcommon-dev libdbus-1-dev \
            libgtk-3-dev libfreetype-dev libcapstone-dev
      - name: Build and stage
        shell: bash
        run: |
          python vendor/vendor.py build \
            --library "${{ matrix.library }}" \
            --arch "${{ matrix.arch }}" \
            --os "${{ matrix.os }}" \
            --stage "$RUNNER_TEMP/stage"
      - name: Pack stage
        shell: bash
        run: tar -C "$RUNNER_TEMP/stage" -cf "$RUNNER_TEMP/stage.tar" .
      - uses: actions/upload-artifact@v6
        with:
          name: stage-build-${{ matrix.library }}-${{ matrix.arch }}-${{ matrix.os }}
          path: ${{ runner.temp }}/stage.tar
          if-no-files-found: error
          retention-days: 3

  release:
    needs: [fetch, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v7
        with:
          pattern: stage-*
          path: _stages
      - name: Unpack stages
        run: |
          for t in _stages/*/stage.tar; do
            tar -C "$(dirname "$t")" -xpf "$t"
            rm "$t"
          done
      - name: Assemble and package
        id: pkg
        env:
          SDK_VERSION: ${{ inputs.sdk_version }}
        run: |
          python vendor/vendor.py package \
            --stages _stages \
            --out dist \
            --version "$SDK_VERSION"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: ${{ steps.pkg.outputs.name }}
          body_path: dist/RELEASE_BODY.md
          files: |
            dist/azoth-sdk-*.tar.gz
            dist/azoth-sdk-*.zip
            dist/SHA256SUMS
